<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5ead8" />
  <title>Pásame la foto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="landing-body">

  <main class="landing">
    <div class="hero-blob" aria-hidden="true"></div>
    <div class="landing-blob-2" aria-hidden="true"></div>

    <h1 class="landing-brand">Pásame la foto</h1>
    <p class="landing-sub">La galería colaborativa de tu evento</p>

    <section class="auth-card">
      <!-- Login -->
      <form id="loginForm">
        <h2>Accede a tu portal</h2>
        <input type="text" id="loginUser" placeholder="Nombre de usuario" autocomplete="username" autocapitalize="none" spellcheck="false" required />
        <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" required />
        <button type="submit" class="btn-gold">Entrar</button>
        <p id="loginError" class="form-error"></p>
      </form>

      <!-- Registro con código de invitación -->
      <form id="registerForm" hidden>
        <h2>Crea tu portal</h2>
        <input type="text" id="regUser" placeholder="Nombre de usuario" autocomplete="username" autocapitalize="none" spellcheck="false" minlength="3" maxlength="30" required />
        <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required />
        <input type="password" id="regPass" placeholder="Contraseña (mínimo 8 caracteres)" autocomplete="new-password" minlength="8" required />
        <input type="text" id="regCode" placeholder="Código de invitación" autocapitalize="characters" spellcheck="false" required />
        <p class="field-hint">Tu portal tendrá su propia galería y su código QR para los invitados. Usaremos tu email solo si necesitas recuperar la contraseña.</p>
        <button type="submit" class="btn-gold">Crear mi portal</button>
        <p id="registerError" class="form-error"></p>
      </form>

      <button id="toggleAuth" class="link-btn">¿Tienes un código de invitación? Crea tu portal</button>
    </section>
  </main>

  <script src="/pw-toggle.js"></script>
  <script src="/landing.js"></script>
</body>
</html>
