<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fdfbf7" />
  <title>QUE ME CASO!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Barra superior -->
  <header class="topbar">
    <span class="brand">QUE ME CASO!</span>
    <nav class="topbar-actions">
      <button id="qrBtn" class="icon-btn admin-only" title="Código QR" hidden>
        <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v3h-3v-3zm-5 0h3v3h-3v-3zm0 5h3v3h-3v-3zm5 0h3v3h-3v-3z"/></svg>
      </button>
      <button id="logoutBtn" class="icon-btn admin-only" title="Cerrar sesión" hidden>
        <svg viewBox="0 0 24 24"><path d="M10 3h6a2 2 0 0 1 2 2v3h-2V5h-6v14h6v-3h2v3a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm9.5 9-3.5 3.5-1.4-1.4 1.1-1.1H9v-2h6.7l-1.1-1.1 1.4-1.4L19.5 12z"/></svg>
      </button>
      <button id="loginBtn" class="icon-btn" title="Acceso administrador">
        <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 1 5 5v3h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v3h6V7a3 3 0 0 0-3-3zm0 8.5a1.8 1.8 0 0 0-.9 3.35V18a.9.9 0 1 0 1.8 0v-2.15a1.8 1.8 0 0 0-.9-3.35z"/></svg>
      </button>
    </nav>
  </header>

  <!-- Portada -->
  <section class="hero">
    <span class="hero-ornament">✦</span>
    <h1>Nuestro gran día</h1>
    <p class="hero-sub">Comparte tus fotos y videos de la celebración</p>
    <p id="stats" class="hero-stats"></p>
  </section>

  <!-- Galería -->
  <main>
    <div id="gallery" class="gallery"></div>
    <div id="emptyState" class="empty" hidden>
      <span class="empty-icon">✧</span>
      <p>Todavía no hay recuerdos aquí.</p>
      <p class="empty-sub">Sé el primero en compartir uno.</p>
    </div>
  </main>

  <!-- Botón flotante de subida -->
  <label for="fileInput" class="fab">
    <svg viewBox="0 0 24 24"><path d="M12 5a1 1 0 0 1 1 1v5h5a1 1 0 1 1 0 2h-5v5a1 1 0 1 1-2 0v-5H6a1 1 0 1 1 0-2h5V6a1 1 0 0 1 1-1z"/></svg>
    Añadir fotos
  </label>
  <input type="file" id="fileInput" accept="image/*,video/*" multiple hidden />

  <!-- Barra de selección múltiple (admin) -->
  <div id="selectionBar" class="selection-bar" hidden>
    <span id="selectionCount" class="selection-count">0</span>
    <button id="selAll" class="sel-btn">Todas</button>
    <button id="selDownload" class="sel-btn">⬇ Descargar</button>
    <button id="selDelete" class="sel-btn sel-btn-danger">🗑 Borrar</button>
    <button id="selCancel" class="sel-btn sel-btn-cancel">✕</button>
  </div>

  <!-- Progreso de subida -->
  <div id="progress" class="progress" hidden>
    <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    <span id="progressText">Subiendo…</span>
  </div>

  <!-- Aviso (toast) -->
  <div id="toast" class="toast" hidden></div>

  <!-- Modal de login -->
  <div id="loginModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet">
      <h2>Acceso administrador</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" autocomplete="username" required />
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required />
        <button type="submit" class="btn-gold">Entrar</button>
        <p id="loginError" class="form-error"></p>
      </form>
    </div>
  </div>

  <!-- Modal del código QR -->
  <div id="qrModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet modal-center">
      <h2>Código QR del evento</h2>
      <img src="" id="qrImage" alt="Código QR" class="qr-img" />
      <a href="/qr" download="quemecaso-qr.png" class="btn-gold">Descargar QR</a>
    </div>
  </div>

  <!-- Modal de confirmación de borrado -->
  <div id="confirmModal" class="modal modal-confirm" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet modal-center">
      <h2>¿Estás seguro?</h2>
      <p id="confirmText" class="confirm-text"></p>
      <div class="confirm-actions">
        <button id="confirmCancel" class="btn-ghost">Cancelar</button>
        <button id="confirmOk" class="btn-danger">Borrar</button>
      </div>
    </div>
  </div>

  <!-- Visor a pantalla completa -->
  <div id="viewer" class="viewer" hidden>
    <button id="viewerClose" class="viewer-btn viewer-close" title="Cerrar">
      <svg viewBox="0 0 24 24"><path d="M6.4 5 12 10.6 17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4L12 13.4 6.4 19 5 17.6 10.6 12 5 6.4 6.4 5z"/></svg>
    </button>
    <button id="viewerPrev" class="viewer-btn viewer-nav viewer-prev" title="Anterior">
      <svg viewBox="0 0 24 24"><path d="M15 5.4 8.4 12l6.6 6.6L13.6 20l-8-8 8-8L15 5.4z"/></svg>
    </button>
    <button id="viewerNext" class="viewer-btn viewer-nav viewer-next" title="Siguiente">
      <svg viewBox="0 0 24 24"><path d="M9 5.4 15.6 12 9 18.6 10.4 20l8-8-8-8L9 5.4z"/></svg>
    </button>
    <div id="viewerContent" class="viewer-content"></div>
    <div id="viewerActions" class="viewer-actions" hidden>
      <a id="viewerDownload" class="btn-glass" href="#">⬇ Descargar</a>
      <button id="viewerDelete" class="btn-glass btn-glass-danger">🗑 Borrar</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
